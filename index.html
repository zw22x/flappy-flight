<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flappy Flight</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <canvas id="game" width="288" height="512" aria-label="Flappy Flight game"></canvas>
      <div class="hud" aria-hidden="true">
        <div class="stat">
          <span>Best</span>
          <strong id="best">0</strong>
        </div>
        <button id="sound" type="button" aria-label="Toggle sound">Sound On</button>
      </div>
    </main>
    <script src="./game.js"></script>
  </body>
</html>
